<script src="app.js"></script>
<script>
(function () {
  const S = 60;
  const canvas = document.getElementById('orb-canvas');
  canvas.width = S; canvas.height = S;
  const ctx = canvas.getContext('2d');
  const orbEl = document.getElementById('orb');

  // 8×8 ordered Bayer — converts smooth grayscale → 1-bit halftone
  const B8 = [
     0,32, 8,40, 2,34,10,42,
    48,16,56,24,50,18,58,26,
    12,44, 4,36,14,46, 6,38,
    60,28,52,20,62,30,54,22,
     3,35,11,43, 1,33, 9,41,
    51,19,59,27,49,17,57,25,
    15,47, 7,39,13,45, 5,37,
    63,31,55,23,61,29,53,21
  ].map(v => v / 64);

  // Sphere + light constants
  const BASE_R = 0.86;          // sphere radius in −1..1 space
  const OR = 0.72, YF = 0.46;  // orbit radius; y-flatten for 3-D depth illusion

  let hovered  = false;
  let angle    = 1.2;   // current light angle
  let speed    = 0.38;  // rad/s
  let gain     = 0.60;  // brightness multiplier
  let specPow  = 10;    // Phong specular exponent
  let flash    = 0;     // one-shot entry flash
  let breatheT = 0;
  let prevMs   = 0;

  orbEl.addEventListener('mouseenter', () => { hovered = true;  flash = 1.0; });
  orbEl.addEventListener('mouseleave', () => { hovered = false; });

  function frame(ms) {
    const dt = Math.min((ms - prevMs) / 1000, 0.05);
    prevMs = ms;

    speed   += ((hovered ? 2.8  : 0.38) - speed)   * Math.min(1, dt * 4);
    gain    += ((hovered ? 0.90 : 0.60) - gain)     * Math.min(1, dt * 5);
    specPow += ((hovered ? 22   : 10)   - specPow)  * Math.min(1, dt * 4);
    flash    = Math.max(0, flash - dt * 2.5);
    breatheT += dt * 0.55;
    angle   += speed * dt;

    // Sphere radius breathes ±2.2% at rest (alive but subtle)
    const R  = BASE_R * (1 + 0.022 * Math.sin(breatheT));

    // Light direction: elliptical orbit, z always positive (front hemisphere)
    const lx = Math.cos(angle) * OR;
    const ly = Math.sin(angle) * OR * YF;
    const lz = Math.sqrt(Math.max(0, 1 - lx*lx - ly*ly));

    const img = ctx.createImageData(S, S);
    const p   = img.data;

    for (let py = 0; py < S; py++) {
      for (let px = 0; px < S; px++) {
        const u  = (px + 0.5) / S * 2 - 1;
        const v  = -((py + 0.5) / S * 2 - 1);
        const r2 = u*u + v*v;
        if (r2 > R*R) continue;

        // Unit surface normal
        const sz = Math.sqrt(R*R - r2);
        const nx = u/R, ny = v/R, nz = sz/R;

        // Phong: diffuse + specular (eye at +z)
        const ndl  = Math.max(0, nx*lx + ny*ly + nz*lz);
        const rx   = 2*ndl*nx - lx, ry = 2*ndl*ny - ly, rz = 2*ndl*nz - lz;
        const spec = Math.pow(Math.max(0, rz), specPow);

        // Fresnel rim: edge pixels slightly brighter, outlines the sphere
        const rim  = 0.10 * Math.pow(1 - nz, 2.2);

        const lit = (0.05 + ndl*0.58 + spec*0.75 + rim) * gain + flash * 0.30;

        if (Math.min(1, lit) > B8[(py % 8) * 8 + (px % 8)]) {
          const i = (py * S + px) * 4;
          p[i] = p[i+1] = p[i+2] = 0; p[i+3] = 255;
        }
      }
    }

    ctx.putImageData(img, 0, 0);
    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>

<!-- ── Terminal Intro (github.com/mattjss/terminal-intro) ─────────────── -->
<script>
  const LINES = [
    { el: document.getElementById('l1'), text: 'Matt Silverman' },
    { el: document.getElementById('l2'), text: 'Based in San Diego, California' },
    { el: document.getElementById('l3'), text: 'AI-native product designer with focus on\nstrategy, craft, and code.' },
  ];

  const cursor = document.createElement('span');
  cursor.className = 'cursor';

  let actx = null;
  const ac = () => {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    return actx;
  };

  function mkNoise(c, dur) {
    const n = Math.ceil(c.sampleRate * dur);
    const buf = c.createBuffer(1, n, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
    const src = c.createBufferSource(); src.buffer = buf; return src;
  }

  function keyClick() {
    try {
      const c = ac(), t = c.currentTime;
      const noise = mkNoise(c, 0.005);
      const ng = c.createGain();
      ng.gain.setValueAtTime(0.14, t); ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.006);
      noise.connect(ng); ng.connect(c.destination);
      noise.start(); noise.stop(t + 0.007);
      const osc = c.createOscillator(), og = c.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300 + Math.random() * 60, t);
      osc.frequency.exponentialRampToValueAtTime(80, t + 0.04);
      osc.connect(og); og.connect(c.destination);
      og.gain.setValueAtTime(0.055, t); og.gain.exponentialRampToValueAtTime(0.0001, t + 0.045);
      osc.start(); osc.stop(t + 0.05);
    } catch (_) {}
  }

  function enterClick() {
    try {
      const c = ac(), t = c.currentTime;
      const noise = mkNoise(c, 0.008);
      const ng = c.createGain();
      ng.gain.setValueAtTime(0.22, t); ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.01);
      noise.connect(ng); ng.connect(c.destination);
      noise.start(); noise.stop(t + 0.012);
      const osc = c.createOscillator(), og = c.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(220, t);
      osc.frequency.exponentialRampToValueAtTime(60, t + 0.055);
      osc.connect(og); og.connect(c.destination);
      og.gain.setValueAtTime(0.08, t); og.gain.exponentialRampToValueAtTime(0.0001, t + 0.06);
      osc.start(); osc.stop(t + 0.065);
    } catch (_) {}
  }

  function successChime() {
    try {
      const c = ac();
      [[880, 0, 0.12, 0.15], [1108, 0.18, 0.10, 0.18]].forEach(([hz, delay, vol, decay]) => {
        const osc = c.createOscillator(), g = c.createGain();
        osc.type = 'sine'; osc.frequency.value = hz;
        osc.connect(g); g.connect(c.destination);
        const t = c.currentTime + delay;
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.0001, t + decay);
        osc.start(t); osc.stop(t + decay + 0.01);
      });
    } catch (_) {}
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function typeLine(el, text) {
    let textNode = document.createTextNode('');
    el.appendChild(textNode);
    el.appendChild(cursor);
    for (const ch of text) {
      if (ch === '\n') {
        el.insertBefore(document.createElement('br'), cursor);
        textNode = document.createTextNode('');
        el.insertBefore(textNode, cursor);
      } else {
        textNode.textContent += ch;
        keyClick();
      }
      await sleep(36 + Math.random() * 30);
    }
  }

  async function run() {
    await sleep(420);
    for (let i = 0; i < LINES.length; i++) {
      await typeLine(LINES[i].el, LINES[i].text);
      if (i < LINES.length - 1) {
        enterClick();
        await sleep(220);
      }
    }
    successChime();
  }

  ['click', 'keydown', 'touchstart'].forEach(e =>
    document.addEventListener(e, () => ac(), { once: true, passive: true })
  );

  run();
</script>
