<script src="app.js"></script>
<script>
// Scroll to top on load
if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
window.addEventListener('load', () => window.scrollTo(0, 0));

// ── Sound control via postMessage ─────────────────────────────────────────
// Each iframe starts muted (?embed=1 → audioMuted=true at source).
// On hover: send setMuted:false to let the iframe play its own sounds.
// On leave: send setMuted:true. One card active at a time.
// NOTE: works fully on GitHub Pages (same-origin). Localhost = cross-origin,
//       audio may be restricted by the browser.

function iframeMsg(iframe, muted) {
  try { if (iframe) iframe.contentWindow.postMessage({ type: 'setMuted', muted }, '*'); } catch(e) {}
}

document.querySelectorAll('.pg-card').forEach(card => {
  const soundBtn  = card.querySelector('.pg-sound-btn');
  const iframe    = card.querySelector('iframe');
  const video     = card.querySelector('video');
  const soundType = card.dataset.sound;
  let muted   = false; // sound plays on hover by default
  let hovered = false;

  // No data-sound → hide sound button (card has no audio)
  if (!soundType && soundBtn) soundBtn.style.display = 'none';

  function updateIcon() {
    if (!soundBtn) return;
    soundBtn.querySelector('.icon-sound-on').style.display  = muted ? 'none' : '';
    soundBtn.querySelector('.icon-sound-off').style.display = muted ? '' : 'none';
  }
  updateIcon();

  card.addEventListener('mouseenter', () => {
    hovered = true;
    // Silence every other card first
    document.querySelectorAll('.pg-card').forEach(other => {
      if (other === card) return;
      iframeMsg(other.querySelector('iframe'), true);
      const v = other.querySelector('video');
      if (v) { v.muted = true; v.pause(); }
    });
    // Activate this card
    iframeMsg(iframe, muted);
    if (video) { video.muted = true; video.play().catch(()=>{}); }
  });

  card.addEventListener('mouseleave', () => {
    hovered = false;
    iframeMsg(iframe, true);
    if (video) { video.muted = true; video.pause(); video.currentTime = 0; }
  });

  if (soundBtn) {
    soundBtn.addEventListener('click', e => {
      e.stopPropagation();
      muted = !muted;
      updateIcon();
      if (hovered) iframeMsg(iframe, muted);
    });
  }
});


// Broadcast theme to iframes that implement it
(function () {
  const themeBtn = document.getElementById('themeBtn');
  if (!themeBtn) return;
  const syncIds = ['flock-iframe', 'satoshi-iframe', 'terminal-iframe', 'logo-carousel-iframe', 'save-button-iframe', 'matrix-loader-iframe'];

  function broadcastTheme() {
    const theme = document.documentElement.getAttribute('data-theme') || 'light';
    syncIds.forEach(id => {
      const f = document.getElementById(id);
      try { if (f) f.contentWindow.postMessage({ type: 'theme', theme }, '*'); } catch(e) {}
    });
  }

  // Send theme to each iframe as it finishes loading (GitHub Pages iframes can be slow)
  syncIds.forEach(id => {
    const f = document.getElementById(id);
    if (f) f.addEventListener('load', broadcastTheme);
  });

  themeBtn.addEventListener('click', broadcastTheme);
})();
</script>

<!-- ── Nav orb shader ────────────────────────────────────────────────── -->
<script>
(function () {
  const S = 60;
  const canvas = document.getElementById('orb-canvas');
  canvas.width = S; canvas.height = S;
  const ctx = canvas.getContext('2d');
  const orbEl = document.getElementById('orb');

  const B8 = [
     0,32, 8,40, 2,34,10,42,
    48,16,56,24,50,18,58,26,
    12,44, 4,36,14,46, 6,38,
    60,28,52,20,62,30,54,22,
     3,35,11,43, 1,33, 9,41,
    51,19,59,27,49,17,57,25,
    15,47, 7,39,13,45, 5,37,
    63,31,55,23,61,29,53,21
  ].map(v => v / 64);

  const BASE_R = 0.86;
  const OR = 0.72, YF = 0.46;
  let hovered = false, angle = 1.2, speed = 0.38, gain = 0.60, specPow = 10, flash = 0, breatheT = 0, prevMs = 0;

  orbEl.addEventListener('mouseenter', () => { hovered = true;  flash = 1.0; });
  orbEl.addEventListener('mouseleave', () => { hovered = false; });

  function frame(ms) {
    const dt = Math.min((ms - prevMs) / 1000, 0.05); prevMs = ms;
    speed   += ((hovered ? 2.8  : 0.38) - speed)   * Math.min(1, dt * 4);
    gain    += ((hovered ? 0.90 : 0.60) - gain)     * Math.min(1, dt * 5);
    specPow += ((hovered ? 22   : 10)   - specPow)  * Math.min(1, dt * 4);
    flash    = Math.max(0, flash - dt * 2.5);
    breatheT += dt * 0.55; angle += speed * dt;
    const R = BASE_R * (1 + 0.022 * Math.sin(breatheT));
    const lx = Math.cos(angle) * OR, ly = Math.sin(angle) * OR * YF;
    const lz = Math.sqrt(Math.max(0, 1 - lx*lx - ly*ly));
    const img = ctx.createImageData(S, S); const p = img.data;
    for (let py = 0; py < S; py++) {
      for (let px = 0; px < S; px++) {
        const u = (px+.5)/S*2-1, v = -((py+.5)/S*2-1), r2 = u*u+v*v;
        if (r2 > R*R) continue;
        const sz = Math.sqrt(R*R-r2), nx = u/R, ny = v/R, nz = sz/R;
        const ndl = Math.max(0, nx*lx+ny*ly+nz*lz);
        const rx = 2*ndl*nx-lx, ry = 2*ndl*ny-ly, rz = 2*ndl*nz-lz;
        const spec = Math.pow(Math.max(0, rz), specPow);
        const rim = 0.10 * Math.pow(1-nz, 2.2);
        const lit = (0.05+ndl*0.58+spec*0.75+rim)*gain+flash*0.30;
        if (Math.min(1,lit) > B8[(py%8)*8+(px%8)]) {
          const i = (py*S+px)*4; p[i]=p[i+1]=p[i+2]=0; p[i+3]=255;
        }
      }
    }
    ctx.putImageData(img, 0, 0); requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
